# Render.com deployment configuration for the IQC Alpha web app.
# The Express app lives at the root of this repo (immutable.polsia.app).
# Deploy root directory should be set to the repo root.

services:
  - type: web
    runtime: node
    name: app
    region: oregon
    plan: starter
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # set this in the Render dashboard as a secret
      # Add any other secrets here (e.g. OPENAI_API_KEY, STRIPE_SECRET_KEY) as sync: false
